<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="glassGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="softBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- sombra de profundidad -->
  <rect x="24" y="30" width="152" height="152" rx="46" fill="#000000" opacity="0.16" filter="url(#softBlur)"/>

  <!-- cuerpo de vidrio neutro -->
  <rect x="20" y="20" width="160" height="160" rx="46" fill="url(#glassGrad)" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.2"/>

  <!-- reflejo especular diagonal -->
  <rect x="34" y="30" width="130" height="24" rx="12" fill="#ffffff" opacity="0.22" filter="url(#softBlur)" transform="rotate(-18 100 42)"/>

  <!-- borde inferior con leve refracción -->
  <rect x="30" y="152" width="140" height="16" rx="8" fill="#000000" opacity="0.08" filter="url(#softBlur)"/>

  <!-- glifo: rayo (color de énfasis) -->
  <path d="M108,52 L72,112 L94,112 L88,150 L130,90 L106,90 Z" fill="#FFB020"/>
</svg>
